- name: configuring rabbitmq component 
  hosts: rabbitmq
  become: yes
  tasks:
  - name: copy rabbitmq repo 
    ansible.builtin.copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo

  - name: Install rabbitmq 
    ansible.builtin.dnf:
      name: rabbitmq
      state: installed 
  
  - name: start and enable rabbitmq 
    ansible.builtin.service:
      name: rabbitmq
      state: started
      enabled: yes 

  - name: 
    community.rabbitmq.rabbitmq_user:
      user: roboshop 
      password: roboshop123
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present
